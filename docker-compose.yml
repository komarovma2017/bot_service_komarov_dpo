# docker-compose.yml — оркестрация всех сервисов проекта
# 
# Запуск: docker compose up --build
# Остановка: docker compose down
# Сброс БД и очередей: docker compose down -v

version: "3.9"

services:

  # =============================================
  # RabbitMQ — брокер задач для Celery
  # Порт 5672: протокол AMQP (для Celery)
  # Порт 15672: веб-интерфейс (guest/guest)
  # =============================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP протокол
      - "15672:15672"   # Management UI: http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis — хранилище токенов + backend Celery
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =============================================
  # Auth Service — FastAPI (порт 8000)
  # Swagger: http://localhost:8000/docs
  # =============================================
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "8000:8000"
    env_file:
      - ./auth_service/.env
    volumes:
      # Монтируем для сохранения SQLite БД между перезапусками
      - ./auth_service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Bot Service — FastAPI health + aiogram бот
  # =============================================
  bot_service:
    build:
      context: ./bot_service
      dockerfile: Dockerfile
    container_name: bot_service
    ports:
      - "8001:8001"
    env_file:
      - ./bot_service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 &
             uv run python -m app.bot.dispatcher"

  # =============================================
  # Celery Worker — обработка LLM задач
  # Читает задачи из RabbitMQ, вызывает OpenRouter
  # =============================================
  celery_worker:
    build:
      context: ./bot_service
      dockerfile: Dockerfile
    container_name: celery_worker
    env_file:
      - ./bot_service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uv run celery -A app.infra.celery_app worker --loglevel=info
